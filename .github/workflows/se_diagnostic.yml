name: S&E Source Diagnostic

on:
  workflow_dispatch:

jobs:
  test:
    name: Testa undetected-chromedriver no CEPEA
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install undetected-chromedriver selenium

      # Instala Xvfb para rodar Chrome não-headless em CI
      - name: Instalar Xvfb e dependências de display
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb x11-utils

      # Instala Google Chrome (versão estável)
      - name: Instalar Google Chrome
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          google-chrome --version

      - name: Rodar diagnóstico com Xvfb
        run: |
          # Sobe display virtual na porta :99
          Xvfb :99 -screen 0 1280x800x24 &
          export DISPLAY=:99
          sleep 2
          cd "S&E"
          python test_sources.py

      - name: Upload screenshots de debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uc-debug-${{ github.run_id }}
          path: |
            /tmp/uc_screenshot_1.png
            /tmp/uc_screenshot_2.png
            /tmp/cepea_downloads/
          retention-days: 3
          if-no-files-found: ignore
