name: S&E Source Diagnostic

on:
  workflow_dispatch:

jobs:
  test:
    name: Testa fontes de Etanol
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests pandas openpyxl xlrd playwright

      - name: Instalar Chromium
        run: playwright install chromium --with-deps

      - name: Rodar diagnóstico
        run: |
          cd "S&E"
          python test_sources.py

      - name: Upload artefatos de debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-series-${{ github.run_id }}
          path: |
            /tmp/series_screenshot.png
            /tmp/series_page.html
          retention-days: 3
          if-no-files-found: ignore
