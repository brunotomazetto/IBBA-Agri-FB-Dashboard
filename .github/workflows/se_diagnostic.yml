name: S&E Source Diagnostic

on:
  workflow_dispatch:

jobs:
  test:
    name: Testa UDOP
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install undetected-chromedriver selenium

      - name: Instalar Xvfb
        run: sudo apt-get update -qq && sudo apt-get install -y xvfb

      # Instala Chrome 147 especificamente para bater com o ChromeDriver
      - name: Instalar Chrome 147
        run: |
          wget -q "https://storage.googleapis.com/chrome-for-testing-public/147.0.7728.0/linux64/chrome-linux64.zip"
          unzip -q chrome-linux64.zip
          sudo mv chrome-linux64 /opt/chrome-147
          sudo ln -sf /opt/chrome-147/chrome /usr/local/bin/google-chrome
          google-chrome --version

      - name: Rodar teste
        run: |
          Xvfb :99 -screen 0 1280x900x24 &
          export DISPLAY=:99
          sleep 2
          cd "S&E"
          python test_sources.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: /tmp/*.png
          retention-days: 3
          if-no-files-found: ignore
