name: IMEA Histórico (rodar 1x)

on:
  workflow_dispatch:   # só manual, nunca automático

jobs:
  historico:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instala dependências
        run: pip install requests

      - name: Roda carga histórica
        env:
          IMEA_USER: ${{ secrets.IMEA_USER }}
          IMEA_PASS: ${{ secrets.IMEA_PASS }}
        run: python "Agri Monitor/imea/historico_imea.py"

      - name: Commit do banco
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Agri Monitor/imea/imea.db" || true
          git diff --cached --quiet || git commit -m "chore: carga histórica IMEA"
          git push
