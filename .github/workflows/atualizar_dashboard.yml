name: Atualizar Dashboard

on:
  workflow_dispatch:

jobs:
  dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Gerar dashboard
        run: python "Supermarket Prices/gerar_dashboard.py"
      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Supermarket Prices/supermarket_prices.html"
          git diff --cached --quiet || git commit -m "dashboard: atualiza supermarket prices [$(date '+%Y-%m-%d %H:%M')]"
          git push
