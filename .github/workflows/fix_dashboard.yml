name: Fix Dashboard
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pandas requests
      - env:
          SCRIPT_DIR: "Sugar and Ethanol"
        run: python "$SCRIPT_DIR/extractor.py" --dashboard-only
      - env:
          SCRIPT_DIR: "Sugar and Ethanol"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$SCRIPT_DIR/se_dashboard.html"
          git diff --staged --quiet || git commit -m "fix: regenerate dashboard"
          git pull --rebase origin main
          git push
