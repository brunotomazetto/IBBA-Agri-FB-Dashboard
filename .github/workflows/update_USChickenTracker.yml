name: Update U.S. Chicken Tracker DB

on:
  # Weekly update every Monday at 07:00 UTC (market data refreshes)
  schedule:
    - cron: '0 7 * * 1'

  # Manual trigger from GitHub UI (useful after PPC earnings)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger (e.g. PPC Q1 earnings update)'
        required: false
        default: 'Manual update'

jobs:
  update-chicken-db:
    name: Refresh chicken.db
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to git push updated chicken.db back to repo

    steps:
      # ── 1. Checkout repository ────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl

      # ── 4. Run extractor ─────────────────────────────────────────────────
      - name: Run extractor_chicken.py
        working-directory: Chicken/U.S. Tracker
        run: |
          python extractor_chicken.py
        env:
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
          # Set to true to force fresh rebuild (ignores cached data)
          FORCE_REBUILD: ${{ github.event.inputs.reason != '' && 'true' || 'false' }}

      # ── 5. Verify DB was updated ─────────────────────────────────────────
      - name: Verify chicken.db
        working-directory: Chicken/U.S. Tracker
        run: |
          python3 - <<'EOF'
          import sqlite3, os
          db_path = "chicken.db"
          if not os.path.exists(db_path):
              raise FileNotFoundError("chicken.db was not created!")
          con = sqlite3.connect(db_path)
          n = con.execute("SELECT COUNT(*) FROM quarterly").fetchone()[0]
          latest = con.execute("SELECT quarter, updated_at FROM quarterly ORDER BY year_q DESC LIMIT 1").fetchone()
          con.close()
          print(f"✓ chicken.db OK: {n} quarters, latest={latest[0]}, updated={latest[1]}")
          if n < 30:
              raise ValueError(f"Suspiciously few rows: {n}. Check extractor output.")
          EOF

      # ── 6. Commit updated DB back to repository ───────────────────────────
      - name: Commit updated chicken.db
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add Chicken/U.S.\ Tracker/chicken.db
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to chicken.db — skipping commit."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "auto: refresh chicken.db — ${TIMESTAMP}

          Triggered by: ${{ github.event_name }}
          ${{ github.event.inputs.reason != '' && format('Note: {0}', github.event.inputs.reason) || '' }}"
            git push
            echo "✓ chicken.db committed and pushed."
          fi
