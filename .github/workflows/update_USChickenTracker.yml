name: Update U.S. Chicken Tracker DB

on:
  # Every 3 days at 07:00 UTC. Corn updates daily; parts and SBM are weekly —
  # runs between publications are no-ops for those fields, which is safe.
  schedule:
    - cron: '0 7 */3 * *'

  # Manual trigger from GitHub UI (useful after PPC earnings)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger (e.g. PPC Q1 earnings update)'
        required: false
        default: 'Manual update'

jobs:
  update-chicken-db:
    name: Refresh chicken.db
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl pdfplumber

      - name: Run extractor_chicken.py
        working-directory: Chicken/U.S. Tracker
        run: python extractor_chicken.py
        env:
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}

      - name: Verify chicken.db
        working-directory: Chicken/U.S. Tracker
        run: |
          python3 - <<'EOF'
          import sqlite3, os
          db_path = "chicken.db"
          if not os.path.exists(db_path):
              raise FileNotFoundError("chicken.db was not created!")
          con = sqlite3.connect(db_path)
          nq = con.execute("SELECT COUNT(*) FROM quarterly").fetchone()[0]
          nw = con.execute("SELECT COUNT(*) FROM weekly").fetchone()[0]
          latest = con.execute("SELECT quarter, updated_at FROM quarterly ORDER BY year_q DESC LIMIT 1").fetchone()
          con.close()
          print(f"chicken.db OK: {nq} quarters, {nw} weekly rows, latest={latest[0]}, updated={latest[1]}")
          if nq < 30:
              raise ValueError(f"Suspiciously few quarterly rows: {nq}")
          EOF

      - name: Commit updated chicken.db
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add "Chicken/U.S. Tracker/chicken.db"
          if git diff --staged --quiet; then
            echo "No changes to chicken.db — skipping commit."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "auto: refresh chicken.db — ${TIMESTAMP}"
            git push
            echo "chicken.db committed and pushed."
          fi
