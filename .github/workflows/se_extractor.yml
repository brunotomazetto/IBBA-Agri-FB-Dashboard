name: S&E Daily Extractor

on:
  schedule:
    # Roda todo dia útil às 22:00 UTC (19:00 BRT / após fechamento NY)
    - cron: "0 22 * * 1-5"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (não commita o banco)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      carga_historica:
        description: "Forçar carga histórica mensal UNICA (apenas 1ª vez)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  extract:
    name: Coleta S&E (NY11 + Etanol UNICA)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests pandas openpyxl xlrd yfinance

      - name: Executar extractor_se.py
        run: |
          cd "S&E"
          if [ "${{ github.event.inputs.carga_historica }}" = "true" ]; then
            python extractor_se.py --carga-historica
          else
            python extractor_se.py
          fi

      - name: Commit commodities.db
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "S&E/commodities.db"
          git diff --staged --quiet || \
            git commit -m "chore: atualiza commodities.db [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
