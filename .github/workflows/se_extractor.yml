name: S&E Daily Extractor

on:
  schedule:
    # Roda todo dia útil às 22:00 UTC (19:00 BRT / após fechamento NY)
    - cron: "0 22 * * 1-5"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (não commita o banco)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  extract:
    name: Coleta S&E (NY11 + Etanol CEPEA)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Dependências Python ────────────────────────────────────────────────
      - name: Instalar dependências Python
        run: |
          pip install --upgrade pip
          pip install requests pandas openpyxl xlrd yfinance playwright

      # ── 4. Playwright — instala o browser Chromium ────────────────────────────
      # O Chromium headless real é o que passa pelo WAF do CEPEA
      - name: Instalar Chromium (Playwright)
        run: playwright install chromium --with-deps

      # ── 5. Executar extractor ─────────────────────────────────────────────────
      - name: Executar extractor_se.py
        run: |
          cd "S&E"
          python extractor_se.py

      # ── 6. Commit do banco atualizado ─────────────────────────────────────────
      - name: Commit commodities.db
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "S&E/commodities.db"
          git diff --staged --quiet || \
            git commit -m "chore: atualiza commodities.db [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
