name: S&E Daily Extractor

on:
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

jobs:
  extract:
    name: Coleta S&E (NY11 + Etanol UDOP)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install pandas yfinance undetected-chromedriver selenium

      - name: Instalar Xvfb e Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          google-chrome --version

      - name: Executar extractor_se.py
        run: |
          Xvfb :99 -screen 0 1280x900x24 &
          export DISPLAY=:99
          sleep 2
          cd "S&E"
          python extractor_se.py

      - name: Commit commodities.db
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "S&E/commodities.db"
          git diff --staged --quiet || \
            git commit -m "chore: atualiza commodities.db [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase origin main
          git push
