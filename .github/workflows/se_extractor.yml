name: S&E Extractor

on:
  schedule:
    - cron: "0 22 * * 1-5"   # Mon–Fri 22h UTC (19h BRT)
  workflow_dispatch:

jobs:
  extract:
    name: S&E · Fuel · Supply/Demand
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pandas yfinance requests openpyxl undetected-chromedriver selenium

      - name: Install Chrome + Xvfb
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          google-chrome --version

      - name: Run extractor.py
        env:
          SCRIPT_DIR: "Sugar and Ethanol"
        run: |
          Xvfb :99 -screen 0 1280x900x24 &
          export DISPLAY=:99
          sleep 2
          python "$SCRIPT_DIR/extractor.py"

      - name: Commit commodities.db
        env:
          SCRIPT_DIR: "Sugar and Ethanol"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$SCRIPT_DIR/commodities.db"
          git diff --staged --quiet || \
            git commit -m "chore: data update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase origin main
          git push
