name: S&E Daily Extractor

on:
  schedule:
    - cron: "0 22 * * 1-5"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (não commita o banco)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  extract:
    name: Coleta S&E (NY11 + Etanol CEPEA)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências Python
        run: |
          pip install --upgrade pip
          pip install requests pandas openpyxl xlrd yfinance playwright

      - name: Instalar Chromium (Playwright)
        run: playwright install chromium --with-deps

      - name: Executar extractor_se.py
        run: |
          cd "S&E"
          python extractor_se.py

      # Faz upload dos arquivos de debug como artefato do Actions
      # (screenshot + HTML da página CEPEA — visível por 7 dias)
      - name: Upload debug CEPEA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-cepea-${{ github.run_id }}
          path: S&E/_debug/
          retention-days: 7
          if-no-files-found: ignore

      - name: Commit commodities.db
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "S&E/commodities.db"
          git diff --staged --quiet || \
            git commit -m "chore: atualiza commodities.db [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
