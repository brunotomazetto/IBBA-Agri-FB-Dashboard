name: Update CONAB Safra

on:
  schedule:
    - cron: "0 11 8-20 * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instala dependências
        run: pip install requests pandas

      - name: Roda extractor
        run: python "Agri Monitor/conab/extractor_conab.py"

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Agri Monitor/conab/conab.db"
          git diff --cached --quiet || git commit -m "chore: atualiza conab.db $(date +'%Y-%m')"
          git push
